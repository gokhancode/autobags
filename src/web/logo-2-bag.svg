<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1e1e3f"/>
    </linearGradient>
    <linearGradient id="bag" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg2)"/>
  <!-- Shopping bag body -->
  <path d="M 146 200 L 136 400 Q 136 420 156 420 L 356 420 Q 376 420 376 400 L 366 200 Z" fill="url(#bag)"/>
  <!-- Bag handle -->
  <path d="M 200 200 Q 200 130 256 130 Q 312 130 312 200" fill="none" stroke="#a855f7" stroke-width="16" stroke-linecap="round"/>
  <!-- Dollar sign / SOL symbol -->
  <text x="256" y="340" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="900" font-size="120" fill="white" opacity="0.9">$</text>
  <!-- Green up arrow -->
  <polygon points="380,160 410,200 395,200 395,240 365,240 365,200 350,200" fill="url(#glow)"/>
  <!-- Sparkles -->
  <circle cx="140" cy="140" r="6" fill="#22c55e" opacity="0.8"/>
  <circle cx="400" cy="120" r="4" fill="#a855f7" opacity="0.6"/>
  <circle cx="120" cy="300" r="5" fill="#22c55e" opacity="0.5"/>
  <circle cx="410" cy="350" r="6" fill="#a855f7" opacity="0.7"/>
  <!-- Text -->
  <text x="256" y="480" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="900" font-size="40" fill="white" letter-spacing="3">AUTOBAGS</text>
</svg>
