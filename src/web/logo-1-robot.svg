<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg)"/>
  <!-- Robot head -->
  <rect x="156" y="120" width="200" height="160" rx="32" fill="url(#accent)"/>
  <!-- Antenna -->
  <line x1="256" y1="120" x2="256" y2="80" stroke="#a855f7" stroke-width="8" stroke-linecap="round"/>
  <circle cx="256" cy="72" r="14" fill="#22c55e"/>
  <!-- Eyes -->
  <circle cx="210" cy="190" r="24" fill="#0a0a1a"/>
  <circle cx="302" cy="190" r="24" fill="#0a0a1a"/>
  <circle cx="216" cy="184" r="8" fill="#22c55e"/>
  <circle cx="308" cy="184" r="8" fill="#22c55e"/>
  <!-- Mouth (smile) -->
  <path d="M 210 240 Q 256 270 302 240" fill="none" stroke="#0a0a1a" stroke-width="8" stroke-linecap="round"/>
  <!-- Body -->
  <rect x="186" y="290" width="140" height="80" rx="16" fill="url(#accent)" opacity="0.8"/>
  <!-- Chart line on body -->
  <polyline points="206,340 226,320 246,330 266,310 286,315 306,300" fill="none" stroke="#22c55e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arms -->
  <rect x="126" y="300" width="50" height="16" rx="8" fill="url(#accent)" opacity="0.6"/>
  <rect x="336" y="300" width="50" height="16" rx="8" fill="url(#accent)" opacity="0.6"/>
  <!-- Bags -->
  <text x="256" y="440" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="900" font-size="52" fill="white" letter-spacing="4">AUTOBAGS</text>
</svg>
